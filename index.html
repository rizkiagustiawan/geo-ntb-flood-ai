<!DOCTYPE html>
<html>

<head>
    <title>Sumbawa-A.E.C.O Dashboard</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-neon: #deff9a;
            --bg-dark: #121212;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
        }

        #map {
            height: 100vh;
            width: 100vw;
            background: #1a1a1a;
        }

        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(18, 18, 18, 0.9);
            color: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(222, 255, 154, 0.3);
            backdrop-filter: blur(10px);
            width: 300px;
        }

        .metric-card {
            margin-top: 15px;
            padding: 15px;
            background: rgba(222, 255, 154, 0.1);
            border-radius: 8px;
            border-left: 4px solid var(--primary-neon);
        }

        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-neon);
            display: block;
        }

        .metric-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        .stack-tags {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .tag {
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 3px;
            letter-spacing: 0.5px;
            font-family: monospace;
        }

        .tag-rust {
            background: rgba(255, 111, 60, 0.15);
            color: #ff8c5a;
            border: 1px solid rgba(255, 111, 60, 0.25);
        }

        .tag-py {
            background: rgba(222, 255, 154, 0.1);
            color: var(--primary-neon);
            border: 1px solid rgba(222, 255, 154, 0.2);
        }

        .tag-geo {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .legend {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 6px;
            color: white;
            font-size: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }

        .dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }
    </style>
</head>

<body>

    <div class="info-panel">
        <h2 style="margin:0; color:var(--primary-neon); font-size: 20px;">Sumbawa-A.E.C.O</h2>
        <p style="margin:5px 0 0 0; font-size:12px; color: #888;">Autonomous Flood Monitoring</p>

        <div class="metric-card">
            <span class="metric-label">Impacted Area</span>
            <span class="metric-value" id="impact-value">0 Ha</span>
            <p style="font-size: 10px; color: #aaa; margin: 5px 0 0 0;" id="methodology-note">
                Fetching data from A.E.C.O API...
            </p>
        </div>

        <div style="margin-top:12px; font-size:11px; color:#666;">
            System Time WITA: <span id="clock" style="color:#888;">--:--:--</span>
        </div>

        <div class="stack-tags">
            <span class="tag tag-rust">Rust PyO3</span>
            <span class="tag tag-py">XGBoost API</span>
            <span class="tag tag-geo">Sentinel-1 NRT</span>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="dot" style="background:#ff3b3b;"></div> Critical Flood Zone
        </div>
        <div class="legend-item">
            <div class="dot" style="background:rgba(222,255,154,0.5);"></div> Sumbawa Boundary
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Clock WITA
        function updateClock() {
            var now = new Date(); var wita = new Date(now.getTime() + 8 * 3600 * 1000);
            document.getElementById('clock').textContent = String(wita.getUTCHours()).padStart(2, '0') + ':' + String(wita.getUTCMinutes()).padStart(2, '0') + ':' + String(wita.getUTCSeconds()).padStart(2, '0');
        }
        setInterval(updateClock, 1000); updateClock();

        // Map
        var map = L.map('map', { zoomControl: false }).setView([-8.65, 117.8], 9);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap contributors &copy; CARTO' }).addTo(map);

        // Sumbawa Boundary (statis)
        L.polygon([[-8.05, 116.75], [-8.0, 117.0], [-8.05, 117.3], [-8.1, 117.6], [-8.2, 117.9], [-8.3, 118.2], [-8.45, 118.5], [-8.6, 118.75], [-8.75, 118.9], [-8.9, 118.85], [-9.05, 118.7], [-9.1, 118.4], [-9.05, 118.1], [-9.0, 117.8], [-8.95, 117.5], [-9.0, 117.2], [-9.0, 116.95], [-8.9, 116.75], [-8.75, 116.65], [-8.55, 116.65], [-8.35, 116.68], [-8.2, 116.7], [-8.1, 116.72], [-8.05, 116.75]], { color: 'rgba(222,255,154,0.35)', weight: 1.5, fillColor: 'rgba(222,255,154,0.02)', fillOpacity: 1, dashArray: '5,5' }).addTo(map);

        // FASE 2: Nanti masukkan ngrok URL dari Colab di sini
        const API_URL = 'https://YOUR_NGROK_URL_FROM_COLAB.ngrok-free.app/api/floods';

        // Fungsi buat ambil data dari API asli
        async function fetchFloodData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // Update UI
                document.getElementById('impact-value').textContent = data.total_ha + ' Ha';
                document.getElementById('methodology-note').innerHTML = data.methodology;

                // Tambah poligon banjir dari GeoJSON asli
                L.geoJSON(data.geojson, {
                    style: function (feature) {
                        return { color: 'rgba(255,30,30,0.9)', weight: 1.5, fillColor: 'rgba(255,30,30,0.25)', fillOpacity: 1 };
                    }
                }).addTo(map).bindPopup(layer => `Impacted Area: ${data.total_ha} Ha`);

            } catch (error) {
                logger.error("Failed to connect to A.E.C.O API");
                document.getElementById('methodology-note').textContent = "⚠️ Error connecting to API.";
            }
        }

        // fetchFloodData(); // Nanti nyalakan kalau Colab sudah jalan
    </script>
</body>

</html>
