<!DOCTYPE html>
<html>

<head>
    <title>Sumbawa-A.E.C.O Dashboard | AWS Production</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-neon: #deff9a;
            --bg-dark: #121212;
            --danger-red: #ff3b3b;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #map {
            height: 100vh;
            width: 100vw;
            background: #111;
        }

        /* Scanline Radar Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
            opacity: 0.3;
        }

        .info-panel {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.8);
            color: white;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(222, 255, 154, 0.2);
            backdrop-filter: blur(15px);
            width: 320px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            font-size: 10px;
            color: var(--danger-red);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .dot-blink {
            height: 8px;
            width: 8px;
            background-color: var(--danger-red);
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1.2s infinite ease-in-out;
            box-shadow: 0 0 8px var(--danger-red);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .metric-card {
            margin-top: 20px;
            padding: 15px;
            background: rgba(222, 255, 154, 0.05);
            border-radius: 8px;
            border-left: 4px solid var(--primary-neon);
        }

        .metric-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary-neon);
            display: flex;
            align-items: center;
        }

        .metric-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            display: block;
            margin-bottom: 5px;
        }

        .spinner {
            border: 2px solid rgba(222, 255, 154, 0.1);
            border-top: 2px solid var(--primary-neon);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .stack-tags {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }

        .tag-rust {
            background: rgba(255, 111, 60, 0.1);
            color: #ff8c5a;
            border: 1px solid rgba(255, 111, 60, 0.3);
        }

        .tag-py {
            background: rgba(222, 255, 154, 0.1);
            color: var(--primary-neon);
            border: 1px solid rgba(222, 255, 154, 0.3);
        }

        .tag-aws {
            background: rgba(255, 153, 0, 0.1);
            color: #ff9900;
            border: 1px solid rgba(255, 153, 0, 0.3);
        }

        .legend {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.85);
            padding: 15px 20px;
            border-radius: 12px;
            color: white;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }

        .legend-dot {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            margin-right: 12px;
        }

        /* Animasi poligon banjir */
        .pulse-polygon {
            animation: pulse-fill 2s infinite alternate;
        }

        @keyframes pulse-fill {
            from {
                fill-opacity: 0.2;
            }

            to {
                fill-opacity: 0.6;
            }
        }

        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper {
            background: var(--bg-dark);
            border: 1px solid rgba(222, 255, 154, 0.3);
            border-radius: 8px;
        }

        .leaflet-popup-tip {
            background: var(--bg-dark);
            border: 1px solid rgba(222, 255, 154, 0.3);
        }

        .leaflet-container a.leaflet-popup-close-button {
            color: var(--primary-neon);
        }
    </style>
</head>

<body>

    <div class="scanlines"></div>

    <div class="info-panel">
        <div class="panel-header">
            <div>
                <h2 style="margin:0; color:var(--primary-neon); font-size: 22px;">A.E.C.O AWS</h2>
                <p style="margin:2px 0 0 0; font-size:11px; color: #888;">Autonomous Flood AI</p>
            </div>
            <div class="live-indicator">
                <div class="dot-blink"></div> LIVE AWS
            </div>
        </div>

        <div class="metric-card">
            <span class="metric-label">Estimated Impact Area</span>
            <span class="metric-value" id="impact-value">
                <div class="spinner"></div> <span style="font-size: 14px; font-weight: normal;">Querying AWS...</span>
            </span>
            <p style="font-size: 10px; color: #777; margin: 8px 0 0 0; line-height: 1.4;" id="methodology-note">
                Handshaking with t3.medium Instance...
            </p>
        </div>

        <div style="margin-top:15px; font-size:11px; color:#666; display: flex; justify-content: space-between;">
            <span>System Clock (WITA):</span>
            <span id="clock" style="color:#aaa; font-family: monospace;">--:--:--</span>
        </div>

        <div class="stack-tags">
            <span class="tag tag-rust">⚙️ Rust Engine</span>
            <span class="tag tag-aws">☁️ AWS EC2</span>
            <span class="tag tag-py">🛰️ S1-NRT</span>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--danger-red); box-shadow: 0 0 10px var(--danger-red);"></div>
            <span>Critical Flood Zone</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:rgba(222,255,154,0.4); border: 1px dashed var(--primary-neon);">
            </div>
            <span>Sumbawa Region</span>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Clock WITA
        function updateClock() {
            var now = new Date();
            var wita = new Date(now.getTime() + 8 * 3600 * 1000);
            document.getElementById('clock').textContent = String(wita.getUTCHours()).padStart(2, '0') + ':' + String(wita.getUTCMinutes()).padStart(2, '0') + ':' + String(wita.getUTCSeconds()).padStart(2, '0');
        }
        setInterval(updateClock, 1000); updateClock();

        // Map setup
        var map = L.map('map', { zoomControl: false }).setView([-8.65, 117.8], 9);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // FIX BUG ABU-ABU: Hilangkan '{r}' dari URL CartoDB & Batasi MaxZoom
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
            attribution: '&copy; CARTO',
            maxZoom: 19
        }).addTo(map);

        // FIX BUG ABU-ABU ke-2: Pancing Leaflet untuk re-render size peta
        setTimeout(function () { map.invalidateSize(); }, 500);

        // ---------------------------------------------------------
        // 1. LOAD GADM LEVEL 2 GEOJSON (BATAS PRESISI SUMBAWA)
        // ---------------------------------------------------------
        fetch('./data/sumbawa_island.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: 'rgba(222,255,154,0.6)',
                            weight: 1.5,
                            fillColor: 'transparent',
                            dashArray: '4,6'
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        layer.on('mouseover', function () {
                            this.setStyle({ fillColor: 'rgba(222,255,154,0.1)' });
                        });
                        layer.on('mouseout', function () {
                            this.setStyle({ fillColor: 'transparent' });
                        });
                        layer.bindPopup(`
                            <div style="font-family:'Inter',sans-serif; text-align:center;">
                                <strong style="font-size:14px; color:var(--primary-neon);">${feature.properties.NAME_2}</strong><br>
                                <span style="color:#aaa; font-size:10px;">A.E.C.O Monitored Zone</span>
                            </div>
                        `);
                    }
                }).addTo(map);
            })
            .catch(err => console.error("Gagal load base map GADM:", err));

       // ---------------------------------------------------------
    // 3. AWS RASTER TILE & STATS INTEGRATION
    // ---------------------------------------------------------

    const floodTiles = L.tileLayer('/tiles/{z}/{x}/{y}.png', {
      maxZoom: 19,
      className: 'pulse-layer'
    }).addTo(map);

    async function fetchSystemStats() {
      try {
        await new Promise(resolve => setTimeout(resolve, 1500));

        const response = await fetch('/stats');
        if (!response.ok) throw new Error('API Offline');

        const data = await response.json();
        
        // Hitung Hektar
        const pixelToHa = 0.01;
        const ha_area = (data.flood_pixels * pixelToHa).toLocaleString('id-ID', { minimumFractionDigits: 2 });

        // PAKE BACKTICK (`) DI SINI BIAR AMAN DARI ENTER NYASAR!
        document.getElementById('impact-value').innerHTML = `${ha_area} <span style="font-size:16px; margin-left:5px;">Ha</span>`;
        
        document.getElementById('methodology-note').innerHTML = `<span style="color:var(--primary-neon)">Connected:</span> ${data.map}`;

        // Auto Zoom ke Bima/Area Banjir
        map.flyToBounds([
          [data.bounds.south, data.bounds.west],
          [data.bounds.north, data.bounds.east]
        ], { padding: [50, 50], animate: true, duration: 2 });

      } catch (error) {
        console.error(error);
        document.getElementById('impact-value').innerHTML = `<span style="color:#ff3b3b; font-size:18px;">API OFFLINE</span>`;
      }
    }

    fetchSystemStats();
    </script>
</body>

</html>
