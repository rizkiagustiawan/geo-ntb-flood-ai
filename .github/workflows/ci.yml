# =============================================================================
# Sumbawa-A.E.C.O v2.2 — Continuous Integration Pipeline
# =============================================================================
# Triggers: push / PR to main or develop
# Jobs:
#   1. lint         — ruff static analysis
#   2. test         — pytest on pure Python unit tests (no GeoTIFF/model files)
#   3. docker-build — validates multi-stage Docker image compiles correctly
# =============================================================================

name: CI — Sumbawa-A.E.C.O

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: sumbawa-aeco

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Static Analysis (Ruff)
  # ---------------------------------------------------------------------------
  lint:
    name: Static Analysis (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check api/ src/ tests/ --ignore E501
        # E501: line-too-long — exempt for docstrings in scientific code

  # ---------------------------------------------------------------------------
  # Job 2: Unit Tests (Pure Python — No GeoTIFF/model artifacts required)
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests (PyTest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      # Spin up Redis so Celery broker URL resolves during import tests
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install GDAL system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gdal-bin \
            libgdal-dev \
            python3-gdal

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Install geospatial stack + Celery/Redis for import resolution
          pip install \
            numpy rasterio geopandas shapely pyproj \
            xgboost scikit-learn \
            fastapi uvicorn httpx pydantic \
            "celery[redis]==5.3.6" "redis==5.0.1" \
            fpdf2 matplotlib \
            pytest pytest-cov

      - name: Set environment for test run
        run: |
          echo "CELERY_BROKER_URL=redis://localhost:6379/0" >> $GITHUB_ENV
          echo "CELERY_RESULT_BACKEND=redis://localhost:6379/1" >> $GITHUB_ENV
          echo "PYTHONPATH=${{ github.workspace }}/src:${{ github.workspace }}/api" >> $GITHUB_ENV

      - name: Run pure-unit tests (exclude file/model artifact tests)
        # TestFileExistence and TestGeoTIFFValidity require pre-processed data
        # which is not committed to the repo (large binary files).
        # We run only deterministic, data-free unit tests in CI.
        run: |
          pytest tests/test_pipeline.py \
            -k "TestEvaluate or TestFeatures or TestAPI" \
            --tb=short \
            --cov=src \
            --cov=api \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  # ---------------------------------------------------------------------------
  # Job 3: Docker Build Validation
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build-time args for Rust toolchain + GDAL
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Verify image entrypoint
        run: |
          docker run --rm \
            -e CELERY_BROKER_URL=redis://localhost:6379/0 \
            ${{ env.IMAGE_NAME }}:ci-${{ github.sha }} \
            python -c "import fastapi, celery, rasterio, xgboost; print('All core imports OK')"
