name: CI — Sumbawa-A.E.C.O

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: sumbawa-aeco

jobs:
  # Job 1: Static Analysis
  lint:
    name: Static Analysis (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff linter
        run: ruff check api/ src/ tests/ --ignore E501

  # Job 2: Unit Tests (The Fix is here)
  test:
    name: Unit Tests (PyTest)
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Geospatial System Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev python3-gdal libgeos-dev libproj-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov  # Testing tools

      - name: Set environment for test run
        run: |
          echo "CELERY_BROKER_URL=redis://localhost:6379/0" >> $GITHUB_ENV
          echo "PYTHONPATH=${{ github.workspace }}/src:${{ github.workspace }}/api" >> $GITHUB_ENV

      - name: Run tests
        run: |
          pytest tests/test_pipeline.py \
            -k "TestEvaluate or TestFeatures or TestAPI" \
            --cov=src --cov=api --cov-report=term-missing -v

  # Job 3: Docker Build
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max