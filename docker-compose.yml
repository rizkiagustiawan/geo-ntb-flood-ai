version: '3.8'
services:
  flood-ai:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src:/app/api
      - RTK_BIN=${RTK_BIN:-}
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    restart: always # Automatic restart on failure for high availability
