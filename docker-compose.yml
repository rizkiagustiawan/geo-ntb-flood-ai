version: '3.8'

services:
  flood-ai:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src:/app/api
      - RTK_BIN=${RTK_BIN:-}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
      - report_cache:/tmp/reports
    depends_on:
      - redis
    restart: always

  worker:
    build: .
    command: celery -A api.tasks worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src:/app/api
      - RTK_BIN=${RTK_BIN:-}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
      - report_cache:/tmp/reports
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

volumes:
  report_cache:
